<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ホットクック メニューブラウザ</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E23B2E">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ホットクック">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF7; --ink:#20201E; --muted:#7A7670;
    --line:#E8E3DA; --card:#FFFFFF;
    --red:#E23B2E; --red-soft:#FCEBE9;
    --display:#17181A; --display-lit:#FF5C4D;
    --chip:#F2EFE9;
    --shadow:0 1px 2px rgba(30,25,20,.05),0 8px 24px -18px rgba(30,25,20,.25);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Zen Kaku Gothic New",system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}

  /* ---- header ---- */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(251,250,247,.85); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .bar{max-width:1180px;margin:0 auto;padding:14px 20px}
  .titlerow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:19px;font-weight:700;margin:0;letter-spacing:.01em}
  h1 .k{color:var(--red)}
  .count{font-family:"Roboto Mono",monospace;font-size:12px;color:var(--muted)}
  .controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center}
  .searchrow{display:flex;gap:8px;margin-top:12px;align-items:center}
  .fbtn{
    display:none; flex:none; align-items:center; gap:6px; white-space:nowrap;
    font:inherit;font-size:13px;font-weight:500;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:9px 13px;border-radius:10px;
  }
  .fbtn .fbadge{
    display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;
    padding:0 5px;border-radius:999px;background:var(--red);color:#fff;font-size:11px;font-weight:700;
  }
  .fbtn .fbadge[hidden]{display:none}
  .search{
    flex:1 1 260px; min-width:0; display:flex;align-items:center;gap:8px;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;
  }
  .search svg{flex:none;opacity:.5}
  .search input{border:0;outline:0;background:none;font:inherit;font-size:15px;width:100%;color:var(--ink)}
  select{
    font:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--line);
    border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer;
  }
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{
    font:inherit;font-size:13px;font-weight:500;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:8px 13px;border-radius:999px;transition:.12s;
  }
  .chip:hover{border-color:#d8d2c8}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .chip.red[aria-pressed="true"]{background:var(--red);border-color:var(--red)}
  /* 系統チップ（複数選択）の行。選択中は赤で目立たせる */
  .catrow{display:flex;align-items:flex-start;gap:8px;margin-top:12px}
  .flabel{font-size:12px;color:var(--muted);font-weight:500;padding-top:8px;flex:none}
  .catrow .chips{flex:1}
  .chip.small{font-size:12px;padding:6px 11px}
  #catchips .chip[aria-pressed="true"]{background:var(--red);border-color:var(--red);color:#fff}
  .catclear{font-size:12px;padding:6px 10px;color:var(--muted)}

  /* ---- grid ---- */
  main{max-width:1180px;margin:0 auto;padding:22px 20px 80px}
  .grid{
    display:grid;gap:16px;
    grid-template-columns:repeat(auto-fill,minmax(185px,1fr));
  }
  /* リスト表示: 小さめサムネ＋名前＋メタの横並び行。一画面に多く出て一覧性が高い */
  .grid.list{grid-template-columns:1fr;gap:8px}
  .grid.list .card{flex-direction:row;align-items:stretch}
  .grid.list .thumb{width:92px;flex:none;aspect-ratio:auto}
  .grid.list .body{padding:9px 12px;gap:6px;justify-content:center}
  .grid.list .num{top:5px;left:5px;font-size:12px;padding:2px 6px}
  .grid.list .name{font-size:15px;line-height:1.35}
  .grid.list .pill{font-size:11px;padding:2px 7px}
  @media (min-width:760px){ .grid.list{grid-template-columns:1fr 1fr;gap:8px 16px} }
  @media (max-width:520px){ .grid.list .thumb{width:76px} }
  /* 詳細リスト表示: リスト行に材料も出す。1画面の件数は減るが中身が分かる */
  .grid.detail{grid-template-columns:1fr;gap:10px}
  .grid.detail .card{flex-direction:row;align-items:stretch}
  .grid.detail .thumb{width:120px;flex:none;aspect-ratio:auto}
  .grid.detail .body{padding:11px 14px;gap:7px;justify-content:flex-start}
  .grid.detail .num{top:5px;left:5px;font-size:12px;padding:2px 6px}
  .grid.detail .name{font-size:16px;line-height:1.35}
  .grid.detail .pill{font-size:11px;padding:2px 7px}
  .grid.detail .ing{display:block}
  @media (min-width:900px){ .grid.detail{grid-template-columns:1fr 1fr;gap:10px 16px} }
  @media (max-width:520px){ .grid.detail .thumb{width:96px} }
  /* 材料（詳細表示のみ表示） */
  .ing{display:none;font-size:12.5px;line-height:1.65;color:#6b665d}
  .ing b{color:#8a5a2a;font-weight:700;font-size:11px;margin-right:5px;letter-spacing:.02em}
  .viewseg{display:inline-flex;gap:0}
  .viewseg .chip{border-radius:0}
  .viewseg .chip:first-child{border-radius:8px 0 0 8px}
  .viewseg .chip:last-child{border-radius:0 8px 8px 0}
  .viewseg .chip + .chip{border-left:none}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;
    transition:transform .12s ease, box-shadow .12s ease;
    color:inherit;text-decoration:none;cursor:pointer;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(30,25,20,.06),0 18px 34px -20px rgba(30,25,20,.4)}
  .thumb{position:relative;aspect-ratio:4/3;background:#EFEBE3;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .fallback{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    flex-direction:column;gap:6px;text-align:center;padding:14px;
    background:repeating-linear-gradient(135deg,#F0ECE4,#F0ECE4 10px,#ECE7DE 10px,#ECE7DE 20px);
    color:var(--muted);font-size:13px;line-height:1.4;
  }
  .num{
    position:absolute;top:9px;left:9px;
    font-family:"Roboto Mono",monospace;font-weight:700;font-size:14px;letter-spacing:.06em;
    background:var(--display);color:var(--display-lit);
    padding:4px 9px;border-radius:7px;
    box-shadow:0 1px 6px rgba(0,0,0,.3), inset 0 0 0 1px rgba(255,255,255,.06);
    text-shadow:0 0 8px rgba(255,92,77,.55);
  }
  .body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:9px;flex:1}
  .name{font-size:15px;font-weight:500;line-height:1.42;text-decoration:none;color:var(--ink)}
  .card:hover .name{color:var(--red)}
  .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;align-items:center}
  .pill{font-size:11.5px;padding:3px 8px;border-radius:6px;background:var(--chip);color:#5f5b54;font-weight:500}
  .pill.time{font-family:"Roboto Mono",monospace}
  .pill.yoyaku{background:#EAF2EC;color:#2f6b40}
  .pill.cloud{background:var(--red-soft);color:var(--red)}
  .pill.lim{background:#EDEAF6;color:#5a4b8a}
  .pill.cat{background:#EEF1F4;color:#42576b}
  .pill.main{background:#FBF0E4;color:#8a5a2a}
  /* 自前リスト（お気に入り/気になる/つくった）のトグル */
  .marks{display:flex;gap:6px;margin-left:auto;align-items:center;flex:none;padding:2px 0 2px 10px}
  .mark{
    cursor:pointer;user-select:none;min-width:31px;height:31px;line-height:29px;text-align:center;
    border:1px solid var(--line);border-radius:8px;font-size:15px;color:#c4bfb6;background:var(--card);
  }
  .mark:hover{border-color:#d8d2c8}
  .mark.on{color:#fff}
  .mark.on[data-mark="fav"]{background:var(--red);border-color:var(--red)}
  .mark.on[data-mark="want"]{background:#d99a1c;border-color:#d99a1c}
  .mark.on[data-mark="made"]{background:#2f8f4e;border-color:#2f8f4e}
  .chip.mk[aria-pressed="true"][data-mk="fav"]{background:var(--red);border-color:var(--red)}
  .chip.mk[aria-pressed="true"][data-mk="want"]{background:#d99a1c;border-color:#d99a1c}
  .chip.mk[aria-pressed="true"][data-mk="made"]{background:#2f8f4e;border-color:#2f8f4e}
  /* プリキャッシュ */
  .dlbtn{font:inherit;font-size:12px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:6px 12px;border-radius:8px}
  .dlbtn:disabled{opacity:.6;cursor:default}
  .dlprog{font-size:12px;color:var(--muted);margin-left:8px}

  /* 系統ごとの見出し（グループ表示時）: 赤アクセントの帯でハッキリ区切る */
  .group{
    grid-column:1/-1;display:flex;align-items:center;gap:10px;
    margin:20px 0 4px;padding:8px 13px;
    background:var(--red-soft);border-left:4px solid var(--red);border-radius:0 8px 8px 0;
  }
  .group:first-child{margin-top:2px}
  .group h2{font-size:16px;font-weight:700;margin:0;color:#b02a20}
  .group .gc{font-family:"Roboto Mono",monospace;font-size:12px;color:#b02a20;opacity:.8}

  .empty{text-align:center;color:var(--muted);padding:80px 20px;font-size:15px}
  footer{max-width:1180px;margin:0 auto;padding:0 20px 50px;color:var(--muted);font-size:12px;line-height:1.7}
  footer code{font-family:"Roboto Mono",monospace;background:var(--chip);padding:1px 5px;border-radius:4px}

  /* モバイル: 検索だけ常時表示。プルダウン/チップは「絞り込み」で開閉して画面を圧迫しない */
  @media (max-width:640px){
    .bar{padding:11px 14px}
    h1{font-size:16px}
    .fbtn{display:inline-flex}
    .filters{display:none}
    .filters.open{display:block}
    .filters .controls{margin-top:10px}
  }
  @media (max-width:520px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* 検索ヒットのハイライト */
  mark{background:#FFE7A3;color:inherit;border-radius:3px;padding:0 1px}
  .pill.made{background:#EAF5EC;color:#2f8f4e}

  /* ヘッダーの機種バッジ（いつでも変更できると分かるように常設） */
  .modelbadge{
    font:inherit;font-size:12px;cursor:pointer;white-space:nowrap;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:4px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;
  }
  .modelbadge:hover{border-color:var(--red);color:var(--red)}
  .modelbadge.unset{border-color:var(--red);color:var(--red);background:var(--red-soft)}

  /* モーダル（詳細シート／機種オンボーディング共通の下地） */
  .overlay{position:fixed;inset:0;z-index:40;background:rgba(30,25,20,.5);backdrop-filter:blur(2px)}
  .overlay[hidden]{display:none}
  .modal{
    position:fixed;z-index:41;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(560px,calc(100vw - 28px));max-height:calc(100dvh - 40px);
    background:var(--card);border-radius:16px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .modal[hidden]{display:none}
  .modal-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
  .modal-close{
    position:absolute;top:10px;right:10px;z-index:2;width:34px;height:34px;line-height:32px;
    text-align:center;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.9);
    color:var(--ink);font-size:16px;cursor:pointer;
  }
  /* スマホは下から出るボトムシート */
  @media (max-width:640px){
    .modal{
      left:0;top:auto;bottom:0;transform:none;width:100%;max-height:88dvh;
      border-radius:16px 16px 0 0;
    }
  }
  /* 詳細シートの中身 */
  .dphoto{position:relative;width:100%;aspect-ratio:4/3;background:#EFEBE3;overflow:hidden}
  .dphoto img{width:100%;height:100%;object-fit:cover;display:block}
  .dphoto .fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px;background:repeating-linear-gradient(135deg,#F0ECE4,#F0ECE4 10px,#ECE7DE 10px,#ECE7DE 20px);color:var(--muted)}
  .dphoto .num{top:12px;left:12px;font-size:15px}
  .dbody{padding:16px 18px 22px}
  .dname{font-size:20px;font-weight:700;line-height:1.35;margin:0 0 10px}
  .dmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .dmarks{display:flex;gap:8px;margin-bottom:16px}
  .dmarks .mark{flex:1;min-width:0;height:42px;line-height:1;padding:0 8px;font-size:13px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
  .dmade{font-size:12.5px;color:#2f8f4e;margin:-8px 0 14px;font-weight:600}
  .ding h3,.dsteps h3,.dtips h3{font-size:13px;color:var(--muted);margin:0 0 8px;font-weight:700;letter-spacing:.04em}
  .ding h3 .dqty{color:var(--ink);font-weight:500;font-size:12px}
  .ding ul{margin:0 0 18px;padding-left:1.1em;line-height:1.85;font-size:14.5px}
  .dsteps ol{margin:0 0 18px;padding-left:1.4em;font-size:14.5px;line-height:1.7}
  .dsteps ol li{margin-bottom:9px;padding-left:3px}
  .dsteps ol li::marker{color:var(--red);font-weight:700}
  .dtips{background:#FBF7EE;border:1px solid #EFE6D2;border-radius:11px;padding:12px 14px;margin-bottom:18px}
  .dtips h3{margin-bottom:6px}
  .dtips p{margin:0 0 6px;font-size:13px;line-height:1.7;color:#6b6152}
  .dtips p:last-child{margin-bottom:0}
  .dlink{
    display:block;text-align:center;text-decoration:none;font-weight:600;font-size:14px;
    background:var(--red);color:#fff;padding:13px;border-radius:11px;
  }
  .dlink:hover{opacity:.92}
  /* オンボーディング */
  .onb-body{padding:22px 22px 20px}
  .onb-body h2{font-size:18px;margin:0 0 8px}
  .onb-body p{font-size:13.5px;color:var(--muted);line-height:1.7;margin:0 0 16px}
  .onb-body select{width:100%;font-size:15px;padding:12px}
  .onb-btns{display:flex;gap:10px;margin-top:18px}
  .onb-btns button{flex:1;font:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:13px;border-radius:11px;border:1px solid var(--line)}
  #onb-apply{background:var(--red);border-color:var(--red);color:#fff}
  #onb-skip{background:var(--card);color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="titlerow">
      <h1>ホット<span class="k">クック</span> メニューブラウザ</h1>
      <span class="count" id="count"></span>
      <button class="modelbadge" id="modelbadge" type="button" title="機種を選ぶ・変更する"></button>
    </div>
    <div class="searchrow">
      <label class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="料理名・材料・番号で検索（例: カレー / 大根 / 790）" autocomplete="off">
      </label>
      <button class="fbtn" id="f-toggle" type="button" aria-expanded="false" aria-controls="filters">
        絞り込み<span class="fbadge" id="fbadge" hidden></span>
      </button>
    </div>
    <div class="filters" id="filters">
      <div class="controls">
        <select id="model" title="お使いの機種"><option value="">全機種</option></select>
        <select id="sort">
          <option value="no">番号順</option>
          <option value="timeAsc">調理時間 短い順</option>
          <option value="timeDesc">調理時間 長い順</option>
          <option value="nameJa">名前順</option>
          <option value="madeDesc">つくった順（新しい順）</option>
        </select>
        <select id="size">
          <option value="">全サイズ</option>
          <option value="1.0">1.0L</option>
          <option value="1.6">1.6L</option>
          <option value="2.4">2.4L</option>
        </select>
        <select id="main"><option value="">全材料</option></select>
      </div>
      <div class="catrow">
        <span class="flabel">系統</span>
        <div class="chips" id="catchips"></div>
        <button class="chip catclear" id="cat-clear" type="button" hidden>クリア</button>
      </div>
      <div class="controls">
        <div class="chips">
          <button class="chip mk" id="mf-fav"  data-mk="fav"  aria-pressed="false">♥ お気に入り</button>
          <button class="chip mk" id="mf-want" data-mk="want" aria-pressed="false">★ 気になる</button>
          <button class="chip mk" id="mf-made" data-mk="made" aria-pressed="false">✓ つくった</button>
          <span class="viewseg">
            <button class="chip vw" id="v-grid"   data-view="grid"   aria-pressed="false">▦ グリッド</button>
            <button class="chip vw" id="v-list"   data-view="list"   aria-pressed="true">≣ リスト</button>
            <button class="chip vw" id="v-detail" data-view="detail" aria-pressed="false">☰ 詳細（材料つき）</button>
          </span>
          <button class="chip" id="f-group" aria-pressed="true">系統ごとに見出し</button>
          <button class="chip" id="f-yoyaku" aria-pressed="false">予約できる</button>
          <button class="chip red" id="f-cloud" aria-pressed="false">クラウド限定</button>
          <button class="chip red" id="f-notcloud" aria-pressed="false">本体だけで作れる</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>条件に合うメニューがありません。</div>
</main>

<footer>
  <div style="margin-bottom:10px">
    <button class="dlbtn" id="precache" type="button">全画像を端末に保存（オフライン用）</button>
    <span class="dlprog" id="dlprog"></span>
  </div>
  <div style="margin-bottom:10px">
    <button class="dlbtn" id="export-marks" type="button">マーク（♥★✓）を書き出す</button>
    <button class="dlbtn" id="import-marks" type="button">マークを読み込む</button>
    <input type="file" id="import-file" accept="application/json,.json" hidden>
    <span class="dlprog" id="markprog"></span>
  </div>
  メニュー情報・写真は <a href="https://cocoroplus.jp.sharp/kitchen/recipe/" target="_blank" rel="noopener">SHARP COCORO KITCHEN</a> より。個人利用の非公式ツールです。
</footer>

<!-- 詳細シート（カードタップでアプリ内表示。オフラインでも材料まで見られる） -->
<div class="overlay" id="overlay" hidden></div>
<div class="modal" id="sheet" hidden role="dialog" aria-modal="true" aria-labelledby="sheet-name">
  <button class="modal-close" id="sheet-close" type="button" aria-label="閉じる">✕</button>
  <div class="modal-scroll" id="sheet-body"></div>
</div>

<!-- 機種オンボーディング（初回のみ自動表示。バッジからいつでも再表示） -->
<div class="modal" id="onboard" hidden role="dialog" aria-modal="true" aria-labelledby="onb-title">
  <div class="onb-body">

{"source":"sharp","sourceId":"R4111","no":"111","r":"R4111","name":"小麦パン","min":70,"size":"1.6/2.4","lim":"","yoyaku":false,"cloud":false,"models":["HT16E","HT24B","HT99A","HT99B","HW16D","HW16E","HW16F","HW16G","HW16H","HW24C","HW24E","HW24F","HW24G","HW24H","MN16H","SH16W"],"nums":{"MN16H":"78"},"ing":["強力粉","砂糖","塩","ドライイースト","牛乳(室温のもの)","バター"],"qty":"材料：1個分","steps":["ボウルに強力粉、砂糖、塩、ドライイーストを合わせてふるい入れる。牛乳を入れて軽く混ぜた後、柔らかくしたバターを混ぜ込む。生地が固いときは、牛乳小さじ1くらいを足す。内鍋の内側にバター(分量外)をぬる。","生地をひとまとめにし、強力粉をふった台の上でたたきつけるようにして力を入れて約10分、全体が均一に耳たぶくらいの柔らかさになるまでこねる。生地をのばしてみて指が透けて見えればちょうどよい状態。","きれいに丸めなおし、閉じ目をしっかり閉じる。閉じ目を下にして内鍋に入れ、ふたを閉め、1次発酵をさせる。","手動で作る → 発酵・低温調理をする → まぜない → 35℃ → 約35分 → スタート","生地を上から軽く押さえてガスを抜き、生地の端をつかんで四方から折り込む。(ガス抜き)","生地をスケッパーか包丁で6等分して小さく丸め、ラップをかけて約20分おき、休ませる。(ベンチタイム)","内鍋の内側に多めにバター(分量外)をぬる。 (下記パンのポイント参照)","生地を上から軽く押さえてガスを抜き、きれいに丸めなおし、閉じ目をしっかり閉じる。 閉じ目を下にして、写真のように中央を避けて内鍋に並べる。ふたを閉め、2次発酵をさせる。","手動で作る → 発酵・低温調理をする → まぜない → 35℃ → 約35分 → スタート","上面に強力粉(分量外)を茶こしでふり、ふたを閉め、焼き上げる。","メニューを選ぶ → メニュー番号で探す → 【No.0111(小麦パン)】 → 調理を開始する → スタート","加熱後、内鍋から取り出す。","手動で作る → ケーキを焼く → 約15分#","・内鍋にバターをぬるときは、生地が入る程度の高さ(底から1/3程度が目安)まで多めにぬります。","・加熱後、パンが内鍋からはずれにくい場合は、内鍋とパンの間に周囲にヘラなどを入れてすき間をつくり、そっと内側にはずすと取り出しやすくなります。"],"tips":["※生地を少し上から押して平たくすると発酵しやすくなります。","※1次発酵の生地は2～2.5倍にふくれています。指に粉をつけて中央を押し、穴がそのまま残れば、ほどよく発酵しています。穴がもどるのは発酵不足。様子を見ながら、約10分発酵時間を延長してください。","※2次発酵の生地は2～2.5倍にふくれています。発酵不足の場合は様子を見ながら、約10分発酵時間を延長してください。","※上面にも焼色を付けたい時は、パンを裏返し、延長で15分程焼いてもよいでしょう。パンを裏返す時は、ミトンなどを使用し、やけどに気を付けてください。","※延長表示が消えた場合は、"]},

{"source":"sharp","sourceId":"R4119","no":"119","r":"R4119","name":"しょうゆ麹","min":360,"size":"1.6/2.4","lim":"","yoyaku":false,"cloud":false,"models":["HT16E","HT24B","HT99A","HT99B","HW16D","HW16E","HW16F","HW16G","HW16H","HW24C","HW24E","HW24F","HW24G","HW24H","SH16W"],"nums":{},"ing":["米麹(乾燥・一粒ずつにばらしておく)","水","しょうゆ","クッキングシート"],"qty":"材料：(できあがり量約500ｇ)","steps":["内鍋、内ぶた、まぜ技ユニット、材料をかき混ぜるスプーンなどは、アルコール消毒または煮沸消毒(下記ポイント参照)して冷ましておく。","まぜ技ユニットを本体にセットする。","内鍋に、塩麹と同じようにクッキングシートを敷き、全材料を入れてよく混ぜ合わせ、本体にセットする。","メニューを選ぶ → メニュー番号で探す → 【No.0119(しょうゆ麹)】 → 調理を開始する → スタート","●温度設定：自動調理の発酵・低温調理は、加熱スタート後1分以内であれば温度の変更ができます(±３℃まで)。また、食材や調理環境によっては、調理温度と設定温度に差がある場合があります。","●保存：できあがった食品は、内鍋に入れたまま放置せず、すぐに取り出してください。塩麹や手作りみそなどの発酵食品以外は冷蔵室で保存の上、1～2日以内を目安に食べきってください。","●食材：新鮮なものを使用し、生ものを取り扱う際は手袋などをして直接触れないよう衛生面に注意して調理してください。","●ジッパー付き食品保存袋を使用する場合、下記項目をお読みのうえ、食品の漏れや熱による溶け、焦げなどに注意して正しくお使いください。","・ジッパー付き食品保存袋はポリエチレン製の耐熱温度100℃、厚さ0.06mm以上のものをお使いください。","・食材を入れた後、空気をしっかり抜き、上部が上になるように内鍋に入れてください。","・内鍋に必ず水を水位MAXまで入れ、蒸しトレイをセットしてから加熱してください。","・各メニューに記載の分量や使い方などを変更すると、うまく仕上がらない場合があるため、記載通りに調理してください。","・記載している以外の使いかたは、蒸気・内容物の噴き出しややけどの原因になる恐れがありますので、注意してください。","・内鍋に直接食材を入れて作る発酵・低温調理メニューを調理するときは、内鍋、内ぶた、まぜ技ユニット、加熱前に材料をかき混ぜるスプーン等は煮沸消毒をしてから使います。","内ぶた、まぜ技ユニットは本体にセットする。内鍋に水約200mLとスプーン等を入れ、本体にセットする。","手動で作る → スープを作る → まぜない → 約20分 → スタート","加熱後、内鍋を本体から取り出して湯を捨て、ラップをして冷ます。"],"tips":["＊30cm×30cmくらいの大きさのクッキングシートを、材料が漏れたりあふれたりしないように敷いてください。"]},
{"source":"sharp","sourceId":"R4120","no":"120","r":"R4120","name":"スポンジケーキ","min":45,"size":"全","lim":"","yoyaku":false,"cloud":false,"models":["HT16E","HT24B","HT99A","HT99B","HW10E","HW10G","HW16D","HW16E","HW16F","HW16G","HW16H","HW24C","HW24E","HW24F","HW24G","HW24H","MN16H","SH10W","SH16W"],"nums":{"MN16H":"75"},"ing":["卵","薄力粉","砂糖","バニラエッセンス","バター","牛乳","生クリーム","砂糖","バニラエッセンス","ブランデー","仕上げ用フルーツ(いちご、ブルーベリーなどお好みで)"],"qty":"材料：1個分","steps":["内鍋の内側に多めにバター(分量外)をぬる(下記ケーキのポイント参照)。卵は卵黄と卵白に分ける。","卵白は大きいボウルに入れてツノが立つまで泡立て、砂糖の半量を少しずつ加えてさらに泡立てる。","卵黄に残りの砂糖を入れて湯せんし、人肌にあたたまったら取り出し、白っぽく筋がつくくらい(マヨネーズ状)まで泡立てる。","卵黄と卵白を合わせ、バニラエッセンスを加えて泡立器でなめらかになるまで混ぜ合わせる。","(4) に薄力粉をふるいながら加え、泡をこわさないように サックリと、粉けがなくなるまで底から生地を持ち上げる ようにして混ぜ合わせる。","耐熱容器に小さく切ったバターと牛乳を入れ、湯せんにかけて溶かしバターを作る。","(6)をヘラをつたわせて(5)に加え、手早く混ぜ合わせる。","(1)の内鍋に(7)を高い位置から流し入れ、内鍋をゆすって表面をならしたあと、手で鍋の底をトントンとたたいて空気抜きし、本体にセットする。","メニューを選ぶ → メニュー番号で探す → 【No.0120(スポンジケーキ)】 → 調理を開始する → スタート","加熱後、内鍋から取り出し、底を上にして網にのせて冷ます。","ホイップクリームを作る。ボウルにあらかじめ冷やしておいた生クリームと砂糖を入れ、氷水でボウルごと冷やしながら泡立て、とろみが付けば、バニラエッセンスとブランデーを加えてさらに好みの固さに泡立てる。","ホイップクリームとフルーツでデコレーションする。","・内鍋にバターをぬるときは、生地が入る程度の高さ(底から1/3程度が目安)まで多めにぬります。","・加熱後、ケーキが内鍋からはずれにくい場合は、内鍋とケーキの間にヘラなどを入れてすき間をつくり、そっと内側にはずすと取り出しやすくなります。"],"tips":["※卵白、卵黄の泡立てがポイント。しっかり泡立ててください。","※卵の泡立ては力仕事です。 ハンドミキサーがあれば便利です。","※卵の泡立て後、時間が経つと泡が消えてうまく焼けませんので、作業は手早くおこなってください。","※混ぜかたが足りないとキメが粗く、混ぜすぎるとふくらみが悪くなります。","※溶かしバターは、人肌より少し熱めの50～60℃のものが早く生地に混ざります。","※高い位置から流し入れると、泡が均一になります。","※網の上にクッキングシートを敷いておくと、生地が網につかずきれいに仕上がります。"]},

{"source":"sharp","sourceId":"R4278","no":"278","r":"R4278","name":"ローストビーフ","min":195,"size":"全","lim":"F/G/H","yoyaku":false,"cloud":false,"models":["HW10G","HW16F","HW16G","HW16H","HW24F","HW24G","HW24H","MN16H"],"nums":{"MN16H":"67"},"ing":["牛赤身かたまり肉(厚さ6cm以下のもの)","塩","粗びきブラックペッパー","ジッパー付き食品保存袋"],"qty":"材料","steps":["牛肉に塩・ブラックペッパーをする。フライパンを熱し、強火で牛肉の表面にしっかり焼き色がつくまで焼く。","ジッパー付き食品保存袋に(1)を入れ、空気を抜いてしっかりとジッパーを閉める。","内鍋に(2)を入れ、水を水位MAXまで入れた後、蒸しトレイをのせる。","まぜ技ユニットがセットされていないことを確認し、(3)を本体にセットする。","メニューを選ぶ → メニュー番号で探す → 【No.0278(ローストビーフ)】 → 調理を開始する → スタート","加熱後、室温で1時間程度休ませてから、袋から取り出し、好みの厚さに切る。","・玉ねぎ(すりおろす)…1/4個","・ポン酢しょうゆ、みりん…各大さじ3","全材料を小鍋に入れ、ひと煮立ちさせる。","・バルサミコ酢…大さじ3","・しょうゆ、赤ワイン、みりん、砂糖…各大さじ1","・おろしにんにく…小さじ1","全材料を小鍋に入れ、煮詰める。","・マヨネーズ…大さじ3","・粒マスタード…大さじ1","・はちみつ…小さじ1","・塩、こしょう…各適量","全材料を混ぜ合わせる。","※刻んだエストラゴンの酢漬けを入れてもよいでしょう。","(A)#しょうゆ、酒…各大さじ1","(A)#みりん…大さじ2","(A)#練りわさび…適量","#・水溶き片栗粉…適量","#・レモン汁…少々","(A)の材料を小鍋に入れて煮詰め、水溶き片栗粉を加えてひと煮立ちさせる。お好みでレモン汁を加える。","●温度設定：自動調理の発酵・低温調理は、加熱スタート後1分以内であれば温度の変更ができます(±３℃まで)。また、食材や調理環境によっては、調理温度と設定温度に差がある場合があります。","●保存：できあがった食品は、内鍋に入れたまま放置せず、すぐに取り出してください。塩麹や手作りみそなどの発酵食品以外は冷蔵室で保存の上、1～2日以内を目安に食べきってください。","●食材：新鮮なものを使用し、生ものを取り扱う際は手袋などをして直接触れないよう衛生面に注意して調理してください。","●ジッパー付き食品保存袋を使用する場合、下記項目をお読みのうえ、食品の漏れや熱による溶け、焦げなどに注意して正しくお使いください。","・ジッパー付き食品保存袋はポリエチレン製の耐熱温度100℃、厚さ0.06mm以上のものをお使いください。","・食材を入れた後、空気をしっかり抜き、上部が上になるように内鍋に入れてください。","・内鍋には必ず水を水位MAXまで入れ、蒸しトレイをセットしてから加熱してください。","・各メニューに記載の分量や使いかたなどを変更すると、うまく仕上がらない場合があるため、記載通りに調理してください。","・記載している以外の使いかたは、蒸気・内容物のふき出しややけどの原因になるおそれがありますので、注意してください。"],"tips":["※加熱前に比べ表面の焼き色が薄くなっている場合があります。お好みで再度フライパンで表面に焼き色を付けてもよいでしょう。"]},

{"source":"sharp","sourceId":"R4423","no":"423","r":"R4423","name":"八尾若ごぼうの煮びたし","min":20,"size":"1.6/2.4","lim":"F/G/H","yoyaku":false,"cloud":true,"models":["HW16F","HW16G","HW16H","HW24F","HW24G","HW24H"],"nums":{},"ing":["八尾若ごぼう(軸・根)","油揚げ","だし汁","しょうゆ、みりん","塩"],"qty":"材料：4人分","steps":["まぜ技ユニットを本体にセットする。","若ごぼうの軸は3～4cm幅に切り、根はささがきにして10～15分水にさらしてアクを抜く。油揚げは、短冊切りにする。","内鍋に水気をきった若ごぼうの軸と根、油揚げ、[A]を入れる。","(3)を本体にセットする。","メニューを選ぶ → メニュー番号で探す → 【No.0423(八尾若ごぼうの煮びたし)】 → 調理を開始する → スタート","大阪府八尾市産の若ごぼうは「八尾若ごぼう｣という名称で地域団体商標を取得し、別名｢葉ごぼう｣｢やーごんぼ｣と呼ばれています。独特の歯ざわりと香りが特徴で、春を知らせる野菜として親しまれています。"],"tips":[]},
{"source":"sharp","sourceId":"R4424","no":"424","r":"R4424","name":"グラハムパン","min":70,"size":"1.6/2.4","lim":"","yoyaku":false,"cloud":true,"models":["HW16D","HW16E","HW16F","HW16G","HW16H","HW24C","HW24E","HW24F","HW24G","HW24H","SH16W"],"nums":{},"ing":["全粒粉(製パン用)","砂糖","塩","ドライイースト","牛乳(室温のもの)","バター"],"qty":"材料：1個分","steps":["ボウルに全粒粉、砂糖、塩、ドライイーストを合わせてふるい入れる。牛乳を入れて軽く混ぜた後、柔らかくしたバターを混ぜ込む。生地が固いときは、牛乳小さじ1くらいを足す。内鍋の内側にバター(分量外)をぬる。","生地をひとまとめにし、強力粉をふった台の上でたたきつけるようにして力を入れて約10分、全体が均一に耳たぶくらいの柔らかさになるまでこねる。生地をのばしてみて指が透けて見えればちょうどよい状態。","きれいに丸めなおし、閉じ目をしっかり閉じる。閉じ目を下にして内鍋に入れ、ふたを閉め、1次発酵をさせる。","手動で作る → 発酵・低温調理をする → まぜない → 35℃ → 約35分 → 調理を開始する → スタート","生地を上から軽く押さえてガスを抜き、生地の端をつかんで四方から折り込む。(ガス抜き)","生地をスケッパーか包丁で8等分して小さく丸め、ラップをかけて約20分おき、休ませる。(ベンチタイム)内鍋の内側に多めにバター(分量外)をぬる (下記、パンのポイント参照)。","生地を上から軽く押さえてガスを抜き、きれいに丸めなおし、閉じ目をしっかり閉じる。 閉じ目を下にして、写真のように中央を避けて内鍋に並べる。ふたを閉め、2次発酵をさせる。","手動で作る → 発酵・低温調理をする → まぜない → 35℃ → 約35分 → スタート","上面に強力粉(分量外)を茶こしでふり、ふたを閉め、焼き上げる。","メニューを選ぶ → メニュー番号で探す → 【No.0424(グラハムパン)】 → 調理を開始する → スタート","加熱後、ミトンなどを使って内鍋から取り出す。","・内鍋にバターをぬるときは、生地が入る程度の高さ(底から1/3程度が目安)まで多めにぬります。","・加熱後、パンが内鍋からはずれにくい場合は、内鍋とパンの間に周囲にヘラなどを入れてすき間をつくり、そっと内側にはずすと取り出しやすくなります。"],"tips":["※生地を少し上から押して平たくすると発酵しやすくなります。","※1次発酵の生地は2～2.5倍にふくれています。指に粉をつけて中央を押し、穴がそのまま残れば、ほどよく発酵しています。穴がもどるのは発酵不足。様子を見ながら、約10分発酵時間を延長してください。","※2次発酵の生地は2～2.5倍にふくれています。発酵不足の場合は様子を見ながら、約10分発酵時間を延長してください。"]},

{"source":"sharp","sourceId":"R4482","no":"482","r":"R4482","name":"丸ごとトマトの美白＆湿気排出スープ","min":15,"size":"全","lim":"","yoyaku":false,"cloud":true,"models":["HW10E","HW10G","HW16D","HW16E","HW16F","HW16G","HW16H","HW24C","HW24E","HW24F","HW24G","HW24H","SH10W","SH16W"],"nums":{},"ing":["トマト","ブロックベーコン","緑豆もやし","コンソメ(顆粒)","水","卵","塩、こしょう","ゆでたオクラ(飾り用)"],"qty":"材料：2人分","steps":["トマトは包丁の先でヘタをくり抜く。","ブロックベーコンは短冊状に切る。","内鍋に(1)、(2)、緑豆もやし、[A]を入れ、本体にセットする。","メニューを選ぶ → メニュー番号で探す → 【No.0482(丸ごとトマトの美白＆湿気排出スープ)】 → 調理を開始する → スタート","加熱後、トマトだけを取り出し、内鍋に溶いた卵をまわし入れ、延長で1分加熱する。取り出したトマトは、皮を取り、器に盛っておく。","延長加熱後、塩、こしょうで味を整え、トマトのまわりを囲むように器に盛り、ゆでたオクラを輪切りにして散らす。","丸ごとトマトがインパクト大の美白＆湿気排出スープです。","夏の紫外線から肌を守るために必要なのはトマト！美白効果の高い美容食材です。","もやしは必ず「緑豆もやし」で！湿気と熱を排出してだるさを取ります。","オクラの粘りは胃や腸の粘膜保護で、湿気で胃腸が弱りやすい時期には最適。","縦に切ったり横に切ったりして、オクラの可愛い断面を活かした盛り付けをして楽しみましょう！"],"tips":["※卵は、保存状態や大きさなどによって仕上がりが変わることがあります。卵がゆるいときは、1分を目安にさらに加熱を延長してください。"]},
{"source":"sharp","sourceId":"R4483","no":"483","r":"R4483","name":"ルーローハン(エバラ食品)","min":25,"size":"全","lim":"","yoyaku":false,"cloud":true,"models":["HW10E","HW10G","HW16D","HW16E","HW16F","HW16G","HW16H","HW24C","HW24E","HW24F","HW24G","HW24H","SH10W","SH16W"],"nums":{},"ing":["豚バラ肉(かたまり)","たけのこ(水煮)","生しいたけ","ゆで卵","エバラすき焼のたれ","五香粉","ごはん","チンゲン菜(ゆでたもの)"],"qty":"材料：4人分","steps":["まぜ技ユニットを本体にセットする。","たけのこと生しいたけは、1cm角に切り、豚肉は半分を1cm幅に、残りの半分を1cm角に切る。","内鍋に(2)とゆで卵、[A]を入れ、本体にセットする。","メニューを選ぶ → メニュー番号で探す → 【No.0483(ルーローハン(エバラ食品))】 → 調理を開始する → スタート","どんぶりにごはんを盛り、(3)と好みでチンゲン菜を添える。","エバラ「すき焼のたれ」は、これ1本で味が決まる和風万能調味料。","本醸造醤油、砂糖、本みりん、鰹節エキスなど、煮物をつくるときに","必要な調味料がすべて入っているので、いろいろな調味料を計量する必要はありません。","ホットクックと「すき焼のたれ」で、和風のレパートリーがぐっと広がります！"],"tips":["※写真の卵は、半熟卵を加熱後の煮汁につけたものです。","※肉と一緒に煮込むこともできますが、仕上がりはかたゆで卵になります。","※半熟卵の作りかた：卵を熱湯に入れて6分ゆで、氷水にとります。殻をむいて煮汁につけておくとよいでしょう。"]},
{"source":"sharp","sourceId":"R4484","no":"484","r":"R4484","name":"韓国風ピリ辛炊き込みごはん(エバラ食品)","min":50,"size":"全","lim":"","yoyaku":false,"cloud":true,"models":["HW10E","HW10G","HW16D","HW16E","HW16F","HW16G","HW16H","HW24C","HW24E","HW24F","HW24G","HW24H","SH10W","SH16W"],"nums":{},"ing":["米","牛薄切り肉","エバラ黄金の味","エバラキムチ鍋の素","水","ごま油","豆もやし","青ねぎ"],"qty":"材料","steps":["米は洗って、水気をきっておく。","牛肉は細切りにし、「黄金の味」で下味をつける。","内鍋に(1)、「キムチ鍋の素」、水、ごま油を入れてひと混ぜし、(2)と豆もやしを広げてのせる。","(3)を本体にセットする","メニューを選ぶ → メニュー番号で探す → 【No.0484(韓国風ピリ辛炊き込みごはん(エバラ食品))】 → 合数を設定する(2合) → スタート","加熱後、ごはん全体を混ぜ合わせて茶わんに盛り、好みで小口切りにした青ねぎを散らす。","■黄金の味","エバラ「黄金の味」は、国産りんごで作った、ちょっと贅沢なたれ。","原料の1/3が「りんご」でできています。使用するりんごは100%国産。","果実由来の自然なとろみが焼いたお肉にほどよくからみ、焼肉はもちろん、炒め物や煮物の隠し味にも使えます。","ホットクックと「黄金の味」で、いつものごはんがさらにおいしくなります！","■キムチ鍋の素","エバラ「キムチ鍋の素」は、20年以上愛され続けるロングセラー商品。","魚介の旨味がぎゅっと詰まった、コク深い味わいのキムチ鍋の素です。","濃縮ボトルタイプなので、人数や好みに合わせて味の調整も自由自在。","お鍋はもちろん、炒め物やスープなど、毎日のおかず作りにも大活躍。","ホットクックと「キムチ鍋の素」で、アレンジメニューが広がります！"],"tips":["※牛肉は炊き上がったときにくっつかないように、広げて入れてください。","※加熱中、蒸気口からおねばが出ることがあります。","※保温キーは使わないでください。"]},

  ["魚介", /魚|さば|サバ|鯖|さんま|サンマ|秋刀魚|いわし|イワシ|鮭|さけ|サーモン|(?<!ん)ぶり|ブリ|(?<!み)たら|タラ|鱈|えび|エビ|海老|いか|イカ|烏賊|たこ(?!焼)|タコ(?!ライス)|蛸|貝|あさり|ホタテ|帆立|まぐろ|マグロ|かつお|しらす|シーフード|ムール|牡蠣/],
  ["卵", /卵|玉子|オムレツ|キッシュ/],
  ["豆・大豆", /大豆|豆腐|納豆|厚揚げ|油揚げ|おから|ひよこ豆|レンズ豆|金時豆|ミックスビーンズ/],
];

// 番号ごとの手修正（例: OVERRIDE["1"]={cat:"煮物", mains:["豚"]}）。空でOK。
const OVERRIDE = {
};

function classify(name){
  for(const [c,re] of CAT_RULES){ if(re.test(name)) return c; }
  return "その他";
}
function mainsOf(name){
  const out=[];
  for(const [m,re] of MAIN_RULES){ if(re.test(name)) out.push(m); }
  return out;
}
// 各レシピに cat / mains を付与（OVERRIDE があれば優先）
const NO_MAIN_CATS = new Set(["スイーツ","パン"]);   // 甘味・パンに主材料タグは付けない（誤爆の保険）
RECIPES.forEach(x=>{
  const o = OVERRIDE[x.no] || {};
  x.cat   = o.cat   || classify(x.name);
  x.mains = o.mains || (NO_MAIN_CATS.has(x.cat) ? [] : mainsOf(x.name));
});

const marks = (()=>{ try{ return JSON.parse(localStorage.getItem(MARKS_KEY)||"{}"); }catch(e){ return {}; } })();
function saveMarks(){ try{ localStorage.setItem(MARKS_KEY, JSON.stringify(marks)); }catch(e){} }
function getMark(r,k){ return !!(marks[r] && marks[r][k]); }
function toggleMark(r,k){
  if(!marks[r]) marks[r]={};
  // 「つくった」はいつ作ったかを残す（タイムスタンプ）。他はフラグのまま。
  if(marks[r][k]) delete marks[r][k]; else marks[r][k] = (k==="made") ? Date.now() : 1;
  if(Object.keys(marks[r]).length===0) delete marks[r];
  saveMarks();
}
const MARK_GLYPH = { fav:"♥", want:"★", made:"✓" };
const MARK_LABEL = { fav:"お気に入り", want:"気になる", made:"つくった" };

// 「つくった」のタイムスタンプ（旧データの made:1 は 0 扱い＝日付なし）
function madeTime(r){ const v=marks[r]&&marks[r].made; return (typeof v==="number"&&v>1)?v:0; }
function madeAgoText(r){
  if(!getMark(r,"made")) return "";
  const t=madeTime(r);
  if(!t) return "つくった";
  const days=Math.floor((Date.now()-t)/86400000);
  if(days<=0) return "今日つくった";
  if(days===1) return "昨日つくった";
  if(days<7)   return `${days}日前につくった`;
  if(days<30)  return `${Math.floor(days/7)}週間前につくった`;
  if(days<365) return `${Math.floor(days/30)}か月前につくった`;
  return `${Math.floor(days/365)}年前につくった`;
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Rコード → レシピ の逆引き（詳細シート用）
const byR = new Map(RECIPES.filter(x=>x.r).map(x=>[x.r,x]));

// 検索語（AND用に分割・小文字化）。render() の先頭で更新する。
let SEARCH_TERMS = [];
// 生テキストを esc しつつ、検索語に一致した箇所を <mark> で囲む
function highlight(text, terms){
  if(!terms || !terms.length) return esc(text);
  const lower = String(text).toLowerCase();
  const ranges = [];
  for(const t of terms){
    if(!t) continue;
    let i=0;
    while((i = lower.indexOf(t, i)) !== -1){ ranges.push([i, i+t.length]); i += t.length; }
  }
  if(!ranges.length) return esc(text);
  ranges.sort((a,b)=>a[0]-b[0]);
  const merged=[];
  for(const r of ranges){
    const last=merged[merged.length-1];
    if(last && r[0]<=last[1]) last[1]=Math.max(last[1],r[1]);
    else merged.push(r.slice());
  }
  let out="", pos=0;
  for(const [s,e] of merged){ out += esc(text.slice(pos,s)) + "<mark>" + esc(text.slice(s,e)) + "</mark>"; pos=e; }
  return out + esc(text.slice(pos));
}

// 選択中の機種での表示番号。もっとクック等は実番号(nums)、HW/SHは導出済みの x.no。
function menuNo(x){
  const m = state.model;
  if(m && x.nums && x.nums[m] != null) return x.nums[m];
  return x.no;
}
// 機種フィルタ: 選択機種に対応するレシピだけ通す（models 未取得の古い OP レコードは全機種表示のみ）
function modelOK(x){
  if(!state.model) return true;
  return Array.isArray(x.models) && x.models.includes(state.model);
}

function card(x){
  // 公式Rコードがあればカード全体をレシピへのリンクにする（名前だけでなくどこをタップしても開く）。
  // 無ければ（将来のノラ等）x.url、どちらも無ければ非リンクの div。
  const href = x.r ? LINK(x.r) : (x.url || "");
  const el = document.createElement(href ? 'a' : 'div');
  el.className = 'card';
  if(x.r) el.dataset.r = x.r;
  if(href){ el.href = href; el.target = '_blank'; el.rel = 'noopener'; }
  const pills = [];
  if(x.cat) pills.push(`<span class="pill cat">${esc(x.cat)}</span>`);
  if(x.min!=null) pills.push(`<span class="pill time">⏱ ${x.min}分</span>`);
  (x.mains||[]).forEach(m=>pills.push(`<span class="pill main">${esc(m)}</span>`));
  if(x.size && x.size!=="全") pills.push(`<span class="pill">${esc(x.size)}L</span>`);
  if(x.lim) pills.push(`<span class="pill lim">${esc(x.lim)}限定</span>`);
  if(x.yoyaku) pills.push(`<span class="pill yoyaku">予約OK</span>`);
  if(x.cloud) pills.push(`<span class="pill cloud">クラウド</span>`);
  if(x.r && getMark(x.r,"made")){ const t=madeAgoText(x.r); if(t) pills.push(`<span class="pill made">${esc(t)}</span>`); }
  const dispNo = esc(String(menuNo(x)));   // 選択機種での番号
  const thumb = x.r
    ? `<img loading="lazy" referrerpolicy="no-referrer" src="${PHOTO(x.r)}" alt="${esc(x.name)}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <div class="fallback"><strong>No.${dispNo}</strong><span>${esc(x.name)}</span></div>`
    : `<div class="fallback" style="display:flex"><strong>No.${dispNo}</strong><span>${esc(x.name)}</span></div>`;
  // 自前リストのトグル（カードは<a>なので span+role=button。クリックはgridで preventDefault）
  const marksHtml = x.r ? `<span class="marks">` + ["fav","want","made"].map(k=>
    `<span class="mark${getMark(x.r,k)?' on':''}" role="button" tabindex="0" data-mark="${k}" data-r="${x.r}" aria-pressed="${getMark(x.r,k)}" title="${MARK_LABEL[k]}">${MARK_GLYPH[k]}</span>`
  ).join('') + `</span>` : "";
  el.innerHTML = `
    <div class="thumb">
      ${thumb}
    </div>
    <div class="body">
      <span class="name">${highlight(x.name, SEARCH_TERMS)}</span>
      ${(x.ing&&x.ing.length)?`<div class="ing"><b>材料</b>${x.ing.map(i=>highlight(i, SEARCH_TERMS)).join('・')}</div>`:''}
      <div class="meta">${pills.join('')}${marksHtml}</div>
    </div>`;
  return el;
}

function groupHead(label,n){
  const el=document.createElement('div');
  el.className='group';
  el.innerHTML=`<h2>${esc(label)}</h2><span class="gc">${n} 件</span>`;
  return el;
}

const collator = new Intl.Collator('ja');
function sortList(list){
  const big = 1e9;
  return list.sort((a,b)=>{
    if(state.sort==="timeAsc")  return (a.min??big)-(b.min??big);
    if(state.sort==="timeDesc") return (b.min??-1)-(a.min??-1);
    if(state.sort==="nameJa")   return collator.compare(a.name,b.name);
    if(state.sort==="madeDesc"){   // つくった順（日付の新しい順）。未記録は末尾。
      const d = madeTime(b.r)-madeTime(a.r);
      if(d) return d;
      return collator.compare(a.name,b.name);
    }
    const na=parseInt(menuNo(a),10), nb=parseInt(menuNo(b),10);   // 番号順は選択機種の番号で
    if(isNaN(na)||isNaN(nb)) return collator.compare(String(menuNo(a)),String(menuNo(b)));
    return na-nb;
  });
}

function render(){
  // 検索語を空白（半角/全角）で分割 → 全語を含むもの（AND）だけ通す
  SEARCH_TERMS = state.q ? state.q.toLowerCase().split(/[\s　]+/).filter(Boolean) : [];
  let list = RECIPES.filter(x=>{
    if(!modelOK(x)) return false;
    if(state.mfav  && !getMark(x.r,"fav"))  return false;
    if(state.mwant && !getMark(x.r,"want")) return false;
    if(state.mmade && !getMark(x.r,"made")) return false;
    if(state.size && !(x.size||"").split('/').includes(state.size) && x.size!=="全") return false;
    if(state.cats.size && !state.cats.has(x.cat)) return false;
    if(state.main && !(x.mains||[]).includes(state.main)) return false;
    if(state.yoyaku && !x.yoyaku) return false;
    if(state.cloud && !x.cloud) return false;
    if(state.notcloud && x.cloud) return false;
    if(SEARCH_TERMS.length){
      const name = x.name.toLowerCase();
      const no1 = String(menuNo(x)), no2 = String(x.no);
      const ings = (x.ing||[]).map(i=>i.toLowerCase());
      // 各語が 名前 / 番号 / 材料 のいずれかに含まれること（語どうしは AND）
      const ok = SEARCH_TERMS.every(t=>
        name.includes(t) || no1.includes(t) || no2.includes(t) || ings.some(i=>i.includes(t))
      );
      if(!ok) return false;
    }
    return true;
  });
  sortList(list);

  grid.classList.remove('list','detail');
  if(state.view==='list') grid.classList.add('list');
  else if(state.view==='detail') grid.classList.add('detail');
  grid.innerHTML = "";
  const frag = document.createDocumentFragment();
  if(state.group){
    const byCat = new Map();
    list.forEach(x=>{ (byCat.get(x.cat)||byCat.set(x.cat,[]).get(x.cat)).push(x); });
    CAT_ORDER.filter(c=>byCat.has(c)).forEach(c=>{
      const items=byCat.get(c);
      frag.appendChild(groupHead(c,items.length));
      items.forEach(x=>frag.appendChild(card(x)));
    });
  } else {
    list.forEach(x=>frag.appendChild(card(x)));
  }
  grid.appendChild(frag);
  empty.hidden = list.length>0;
  // 分母は「選んだ機種で作れる最大件数」（全機種なら総数）、分子は絞り込み後
  const modelTotal = state.model ? RECIPES.filter(modelOK).length : RECIPES.length;
  countEl.textContent = `${list.length} / ${modelTotal} 件`;
  // 「絞り込み」ボタンに、有効なフィルタ数バッジを出す（折りたたみ中でも効き具合が分かる）
  const active = state.cats.size + [state.size,state.main].filter(Boolean).length
    + [state.yoyaku,state.cloud,state.notcloud,state.mfav,state.mwant,state.mmade].filter(Boolean).length;
  const badge = document.getElementById('fbadge');
  if(active){ badge.textContent = active; badge.hidden = false; } else { badge.hidden = true; }
  updateModelBadge();
  saveState();
}

    : `<div class="fallback" style="display:flex"><strong>No.${dispNo}</strong></div>`;
  const marksHtml = ["fav","want","made"].map(k=>
    `<span class="mark${getMark(x.r,k)?' on':''}" role="button" tabindex="0" data-mark="${k}" data-r="${x.r}" aria-pressed="${getMark(x.r,k)}">${MARK_GLYPH[k]} ${MARK_LABEL[k]}</span>`
  ).join('');
  const ago = madeAgoText(x.r);
  const qty = x.qty ? String(x.qty).replace(/^材料[:：]\s*/, '') : '';
  const ingHtml = (x.ing&&x.ing.length)
    ? `<div class="ding"><h3>材料${qty?` <span class="dqty">${esc(qty)}</span>`:''}</h3><ul>${x.ing.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>` : '';
  const stepsHtml = (x.steps&&x.steps.length)
    ? `<div class="dsteps"><h3>作り方</h3><ol>${x.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol></div>` : '';
  const tipsHtml = (x.tips&&x.tips.length)
    ? `<div class="dtips"><h3>ポイント</h3>${x.tips.map(t=>`<p>${esc(t)}</p>`).join('')}</div>` : '';
  const linkHtml = x.r ? `<a class="dlink" href="${LINK(x.r)}" target="_blank" rel="noopener">公式レシピを見る（COCORO KITCHEN）↗</a>` : '';
  sheetBody.innerHTML = `
    <div class="dphoto"><span class="num">No.${dispNo}</span>${photo}</div>
    <div class="dbody">
      <h2 class="dname" id="sheet-name">${esc(x.name)}</h2>
      <div class="dmeta">${pills.join('')}</div>
      <div class="dmarks">${marksHtml}</div>
      <div class="dmade"${ago?'':' hidden'}>✓ ${esc(ago)}</div>
      ${ingHtml}
      ${stepsHtml}
      ${tipsHtml}
      ${linkHtml}
    </div>`;
  lastFocus = document.activeElement;
  overlay.hidden = false; sheet.hidden = false;
  document.body.style.overflow = 'hidden';
  document.getElementById('sheet-close').focus();
}
function closeSheet(){
  sheet.hidden = true; overlay.hidden = true;
  document.body.style.overflow = '';
  if(lastFocus && lastFocus.focus) lastFocus.focus();
}
// シート内のマーク操作（カードと同じ挙動＋「つくった日」表示も更新）
sheetBody.addEventListener('click',e=>{
  const m=e.target.closest('.mark'); if(!m) return;
  doToggleMark(m.dataset.r, m.dataset.mark);
  if(m.dataset.mark==='made'){
    const el=sheetBody.querySelector('.dmade');
    const ago=madeAgoText(m.dataset.r);
    if(el){ el.textContent = '✓ '+ago; el.hidden = !ago; }
  }
});
sheetBody.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ') && e.target.classList.contains('mark')){ e.preventDefault(); e.target.click(); }
});
document.getElementById('sheet-close').addEventListener('click', closeSheet);

/* ============ 機種オンボーディング ============ */
const ONBOARD_KEY = "hotcook_onboarded";
const onboard = document.getElementById('onboard');
function openOnboard(){
  // 現在の機種を初期選択にする
  const sel=document.getElementById('onb-model');
  sel.value = state.model || "";
  lastFocus = document.activeElement;
  overlay.hidden = false; onboard.hidden = false;
  document.body.style.overflow = 'hidden';
}
function closeOnboard(){
  onboard.hidden = true; overlay.hidden = true;
  document.body.style.overflow = '';
  try{ localStorage.setItem(ONBOARD_KEY,"1"); }catch(e){}
  if(lastFocus && lastFocus.focus) lastFocus.focus();
}
function applyModel(v){
  state.model = v;
  const modelSel = document.getElementById('model');
  if([...modelSel.options].some(o=>o.value===v)) modelSel.value=v;
  try{ v ? localStorage.setItem(MODEL_KEY, v) : localStorage.removeItem(MODEL_KEY); }catch(e){}
  render();
}
document.getElementById('onb-apply').addEventListener('click',()=>{
  applyModel(document.getElementById('onb-model').value);
  closeOnboard();
});
document.getElementById('onb-skip').addEventListener('click',()=>{ closeOnboard(); });
document.getElementById('modelbadge').addEventListener('click', openOnboard);

// オーバーレイのクリック／Escで、開いているモーダルを閉じる
overlay.addEventListener('click',()=>{ if(!sheet.hidden) closeSheet(); if(!onboard.hidden) closeOnboard(); });
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape') return;
  if(!sheet.hidden) closeSheet();
  else if(!onboard.hidden) closeOnboard();
});

/* ============ マークの書き出し／読み込み（バックアップ） ============ */
function exportMarks(){
  const prog=document.getElementById('markprog');
  if(!Object.keys(marks).length){ prog.textContent='書き出すマークがありません'; return; }
  const payload = JSON.stringify({app:"hotcook-menu-browser", ver:1, exportedAt:new Date().toISOString(), marks});
  const blob = new Blob([payload], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date(), pad=n=>String(n).padStart(2,'0');
  a.href=url; a.download=`hotcook-marks-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  prog.textContent='書き出しました';
}
function importMarks(file){
  const prog=document.getElementById('markprog');
  const reader=new FileReader();
  reader.onload=()=>{
    let obj; try{ obj=JSON.parse(reader.result); }catch(e){ prog.textContent='読み込めませんでした（JSON形式ではありません）'; return; }
    const incoming = (obj&&obj.marks&&typeof obj.marks==='object') ? obj.marks : (obj&&typeof obj==='object'?obj:null);
    if(!incoming){ prog.textContent='マークデータが見つかりませんでした'; return; }
    let n=0;
    for(const r in incoming){
      const src=incoming[r]; if(!src||typeof src!=='object') continue;
      ["fav","want","made"].forEach(k=>{
        if(!src[k]) return;
        if(!marks[r]) marks[r]={};
        if(k==='made'){
          const cur=typeof marks[r].made==='number'?marks[r].made:0;
          const inc=typeof src.made==='number'?src.made:1;
          marks[r].made = Math.max(cur, inc) || 1;   // 新しい日付を優先。日付なし同士は 1。
        } else { marks[r][k]=1; }
        n++;
      });
    }
    saveMarks();
    // 画面上の全マークを同期して再描画
    document.querySelectorAll('.mark').forEach(el=>{
      const on=getMark(el.dataset.r, el.dataset.mark);
      el.classList.toggle('on',on); el.setAttribute('aria-pressed',String(on));
    });
    render();
    prog.textContent=`${n} 件のマークを読み込みました（既存の記録に統合）`;
  };
  reader.readAsText(file);
}
document.getElementById('export-marks').addEventListener('click', exportMarks);
document.getElementById('import-marks').addEventListener('click',()=>document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change',function(){
  if(this.files && this.files[0]) importMarks(this.files[0]);
  this.value='';   // 同じファイルを続けて選べるように
});

// モバイル: 「絞り込み」で プルダウン/チップ を開閉
document.getElementById('f-toggle').addEventListener('click',function(){
  const open = document.getElementById('filters').classList.toggle('open');
  this.setAttribute('aria-expanded', String(open));
});

// 明示プリキャッシュ: 全レシピ画像を端末キャッシュ(hotcook-photos)へ。オフライン閲覧用。
async function precacheAll(btn, prog){
  btn.disabled = true;
  let cache;
  try{ cache = await caches.open('hotcook-photos'); }
  catch(e){ prog.textContent = 'この環境ではキャッシュを使えません'; btn.disabled=false; return; }
  const urls = [...new Set(RECIPES.filter(x=>x.r).map(x=>PHOTO(x.r)))];
  const N = urls.length; let done=0, ok=0, i=0;
  prog.textContent = `0 / ${N} …`;
  async function worker(){
    while(i < urls.length){
      const u = urls[i++];
      try{ const res = await fetch(u, {mode:'no-cors', referrerPolicy:'no-referrer'}); await cache.put(u, res); ok++; }
      catch(e){}
      done++; if(done%5===0 || done===N) prog.textContent = `${done} / ${N} …`;
    }
  }
  await Promise.all(Array.from({length:8}, worker));
  prog.textContent = `完了: ${ok} / ${N} 枚を端末に保存${ok<N?'（端末の空き容量により一部保存されない場合があります）':''}`;
  btn.disabled = false;
}
document.getElementById('precache').addEventListener('click', function(){
  precacheAll(this, document.getElementById('dlprog'));
});

// 保存済みの絞り込み状態を復元（コントロールにも反映）してから描画する。
if(savedState){
  ["q","sort","size","main"].forEach(k=>{ if(savedState[k]!=null) state[k]=savedState[k]; });
  ["yoyaku","cloud","notcloud","group","mfav","mwant","mmade"].forEach(k=>{ if(typeof savedState[k]==="boolean") state[k]=savedState[k]; });
  // 表示モード復元。旧形式（list:true/false）からも移行する。
  if(["grid","list","detail"].includes(savedState.view)) state.view=savedState.view;
  else if(typeof savedState.list==="boolean") state.view = savedState.list ? "list" : "grid";
  if(Array.isArray(savedState.cats)) state.cats = new Set(savedState.cats);
  else if(typeof savedState.cat==="string" && savedState.cat) state.cats = new Set([savedState.cat]);   // 旧形式との互換
  document.getElementById('q').value = state.q;
  ["sort","size","main"].forEach(id=>{
    const sel=document.getElementById(id);
    if([...sel.options].some(o=>o.value===state[id])) sel.value=state[id];
  });
  document.querySelectorAll('#catchips .chip[data-cat]').forEach(b=>b.setAttribute('aria-pressed', String(state.cats.has(b.dataset.cat))));
  syncCatClear();
  [["f-group","group"],["f-yoyaku","yoyaku"],["f-cloud","cloud"],["f-notcloud","notcloud"],
   ["mf-fav","mfav"],["mf-want","mwant"],["mf-made","mmade"]]
    .forEach(([id,k])=>document.getElementById(id).setAttribute("aria-pressed", String(state[k])));
  document.querySelectorAll('.vw').forEach(b=>b.setAttribute('aria-pressed', String(b.dataset.view===state.view)));
}

render();

// 初回アクセス（案内未表示）だけオンボーディングを出す。
// 既に機種を選んでいる復帰ユーザーには出さず、案内済みフラグだけ立てる。
try{
  if(!localStorage.getItem(ONBOARD_KEY)){
    if(state.model) localStorage.setItem(ONBOARD_KEY,"1");
    else setTimeout(openOnboard, 250);
  }
}catch(e){}

// 復元完了 → 以後は保存する。スクロール位置も戻す。
if(savedState && savedState.y) setTimeout(()=>window.scrollTo(0, savedState.y), 60);
hydrating = false;
let _sc;
window.addEventListener("scroll", ()=>{ clearTimeout(_sc); _sc=setTimeout(saveState,400); }, {passive:true});
window.addEventListener("pagehide", saveState);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") saveState(); });
</script>

<script>
// PWA: Service Worker 登録（オフライン起動＋写真の端末キャッシュ）。
// file:// では動かない（https か localhost が必要）。失敗しても通常表示は継続。
if ("serviceWorker" in navigator && location.protocol !== "file:") {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW登録失敗", e));
  });
}
</script>
